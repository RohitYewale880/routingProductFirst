<mat-card class="product-card">

    <div class="row align-items-center">

        <div class="col-md-5">

            <div class="image-box">
                <img [src]="product.pimage" [alt]="product.pname">
            </div>

        </div>

        <div class="col-md-7">

            <div class="product-info">

                <h1>{{product.pname}}</h1>

                <h2 class="price">
                    ₹ {{product.pprice}}
                </h2>

                <p class="description">
                    {{product.pdescription}}
                </p>

                <div class="detail-row">
                    <strong>Returnable :</strong>
                    <span>{{product.canReturn ? 'Yes' : 'No'}}</span>
                </div>

                <div class="detail-row">

                    <strong>Status :</strong>

                    <span class="status" [ngClass]="{
              'progress' : product.pstatus === 'In-Progress',
              'dispatch' : product.pstatus === 'Dispatched',
              'deliver' : product.pstatus === 'Delivered'
            }">

                        {{product.pstatus}}

                    </span>

                </div>

                <div class="btn-group">

                    <button mat-raised-button color="primary" (click)="onEdit()">

                        <mat-icon>edit</mat-icon>
                        Edit

                    </button>

                    <button mat-raised-button color="warn" (click)="onRemove()">

                        <mat-icon>delete</mat-icon>
                        Delete

                    </button>

                </div>

            </div>

        </div>

    </div>

</mat-card>
